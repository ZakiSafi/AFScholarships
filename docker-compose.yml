services:
  postgres:
    image: postgres:16-alpine
    container_name: afscholarships-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: afscholarships
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afscholarships"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: afscholarships-mailhog
    restart: unless-stopped
    ports:
      - "1026:1025"
      - "8026:8025"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: afscholarships-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: super-secret-key
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/afscholarships?schema=public
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: afscholarships-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
